<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OtkupApp - Polygon parcele</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    #toolbar {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      background: #f7f7f7;
    }

    #toolbar .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }

    #map {
      flex: 1;
      min-height: 400px;
    }

    .label {
      font-weight: bold;
      margin-right: 6px;
    }

    input[type="text"] {
      padding: 6px 8px;
      min-width: 160px;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
    }

    #status {
      font-size: 14px;
    }

    #jsonPreview {
      width: 100%;
      height: 120px;
      font-family: Consolas, monospace;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="toolbar">
      <div class="row">
        <span class="label">ParcelaID:</span>
        <input type="text" id="parcelaId" readonly />

        <span class="label">Lat:</span>
        <input type="text" id="lat" readonly />

        <span class="label">Lng:</span>
        <input type="text" id="lng" readonly />
      </div>

      <div class="row">
        <button id="btnLoad">Učitaj parcelu</button>
        <button id="btnSave">Sačuvaj polygon</button>
        <button id="btnClear">Obriši polygon</button>
        <button id="btnOpenGoogle">Otvori u Google Maps</button>
      </div>

      <div class="row">
        <span id="status">Status: spremno</span>
      </div>

      <div class="row">
        <textarea id="jsonPreview" readonly placeholder="PolygonGeoJSON preview..."></textarea>
      </div>
    </div>

    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>

  <script>
    // ===== CONFIG =====
    
    // Query string expected:
    // ?parcelaId=PAR-00001
    const params = new URLSearchParams(window.location.search);
    const parcelaId = params.get("parcelaId") || "";
    const authToken = params.get("token") || localStorage.getItem('authToken') || '';
    const API_BASE = "https://script.google.com/macros/s/AKfycbyus4FqtQ9iZjHpqGiwTAgq_dkx5wqQ1x3-WriqlXIVgZ_-dNzoAvGYHejvlr6InXkrUg/exec";

    document.getElementById("parcelaId").value = parcelaId;

    const map = L.map("map").setView([43.2838, 21.7161], 15);

    // Esri Satellite (no key)
    const esriSatellite = L.tileLayer(
      "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
      {
        maxZoom: 22,
        attribution: "Tiles © Esri, Maxar, Earthstar Geographics"
      }
    );

    // Optional OSM fallback
    const osm = L.tileLayer(
      "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
      {
        maxZoom: 22,
        attribution: "&copy; OpenStreetMap"
      }
    );

    // Default = satellite
    esriSatellite.addTo(map);

    // Layer switcher
    L.control.layers(
      {
        "Satelit": esriSatellite,
        "OSM": osm
      }
    ).addTo(map);

    const drawnItems = new L.FeatureGroup();
    map.addLayer(drawnItems);

    let markerLayer = null;

    const drawControl = new L.Control.Draw({
      edit: {
        featureGroup: drawnItems,
        remove: true
      },
      draw: {
        polygon: {
          allowIntersection: false,
          showArea: true
        },
        polyline: false,
        rectangle: false,
        circle: false,
        marker: false,
        circlemarker: false
      }
    });
    map.addControl(drawControl);

    function setStatus(msg) {
      document.getElementById("status").textContent = "Status: " + msg;
    }

    function setLatLng(lat, lng) {
      document.getElementById("lat").value = Number(lat).toFixed(6);
      document.getElementById("lng").value = Number(lng).toFixed(6);
    }

    function clearLatLng() {
      document.getElementById("lat").value = "";
      document.getElementById("lng").value = "";
    }

    function setJsonPreview(obj) {
      document.getElementById("jsonPreview").value = obj ? JSON.stringify(obj) : "";
    }
    
    function toNum(v) {
      if (v === null || v === undefined || v === "") return null;
      return Number(String(v).replace(",", "."));
    }
    function polygonCentroid(coords) {
      // coords = [[lng, lat], [lng, lat], ...]
      // shoelace centroid
      let area = 0;
      let cx = 0;
      let cy = 0;

      for (let i = 0; i < coords.length - 1; i++) {
        const [x1, y1] = coords[i];
        const [x2, y2] = coords[i + 1];
        const f = x1 * y2 - x2 * y1;
        area += f;
        cx += (x1 + x2) * f;
        cy += (y1 + y2) * f;
      }

      area *= 0.5;

      if (Math.abs(area) < 1e-12) {
        // fallback simple average
        let sumLng = 0;
        let sumLat = 0;
        for (const [lng, lat] of coords) {
          sumLng += lng;
          sumLat += lat;
        }
        return {
          lng: sumLng / coords.length,
          lat: sumLat / coords.length
        };
      }

      cx = cx / (6 * area);
      cy = cy / (6 * area);

      return { lng: cx, lat: cy };
    }

    function getCurrentPolygonGeometry() {
      let geo = null;

      drawnItems.eachLayer(layer => {
        if (layer instanceof L.Polygon) {
          geo = layer.toGeoJSON().geometry;
        }
      });

      return geo;
    }

    function renderPoint(lat, lng) {
      if (markerLayer) {
        map.removeLayer(markerLayer);
      }

      markerLayer = L.marker([lat, lng]).addTo(map);
    }

    function renderPolygon(geometry) {
      drawnItems.clearLayers();

      const feature = {
        type: "Feature",
        properties: {},
        geometry: geometry
      };

      const layer = L.geoJSON(feature);
      layer.eachLayer(l => {
        drawnItems.addLayer(l);
      });

      const bounds = layer.getBounds();
      if (bounds.isValid()) {
        map.fitBounds(bounds.pad(0.2));
      }
    }

    async function loadParcel() {
      if (!parcelaId) {
        setStatus("nema parcelaId u URL-u");
        return;
      }

      setStatus("učitavanje...");

      const url = `${API_BASE}?action=getParcelGeo&parcelaId=${encodeURIComponent(parcelaId)}&token=${encodeURIComponent(AUTH_TOKEN)}`;
      const res = await fetch(url);
      const data = await res.json();

      if (!data || !data.success) {
        setStatus("greška pri učitavanju");
        return;
      }

      const parcel = data.parcel;

      if (parcel.Lat && parcel.Lng) {
        const lat = toNum(parcel.Lat);
        const lng = toNum(parcel.Lng);

        if (lat !== null && lng !== null && !isNaN(lat) && !isNaN(lng)) {
          map.setView([lat, lng], 17);
          renderPoint(lat, lng);
          setLatLng(lat, lng);
        }
      }

      if (parcel.PolygonGeoJSON) {
        try {
          const geometry = JSON.parse(parcel.PolygonGeoJSON);
          renderPolygon(geometry);
          setJsonPreview(geometry);
        } catch (e) {
          console.error(e);
        }
      }

      setStatus("parcela učitana");
    }

    async function savePolygon() {
      if (!parcelaId) {
        setStatus("nema parcelaId");
        return;
      }

      const geometry = getCurrentPolygonGeometry();
      if (!geometry) {
        alert("Nema iscrtanog poligona.");
        return;
      }

      const coords = geometry.coordinates[0];
      const centroid = polygonCentroid(coords);

      setLatLng(centroid.lat, centroid.lng);
      setJsonPreview(geometry);

      const payload = {
        action: "saveParcelPolygon",
        token: authToken,
        parcelaId: parcelaId,
        polygonGeoJSON: JSON.stringify(geometry),
        lat: Number(centroid.lat.toFixed(6)),
        lng: Number(centroid.lng.toFixed(6))
      };

      setStatus("snimanje...");

      const res = await fetch(API_BASE, {
        method: "POST",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify(payload)
      });

      const data = await res.json();

      if (data.success) {
        renderPoint(payload.lat, payload.lng);
        setStatus("polygon sačuvan");
      } else {
        setStatus("greška pri snimanju");
        alert(data.error || "Greška pri snimanju.");
      }
    }

    function clearPolygon() {
      drawnItems.clearLayers();
      setJsonPreview(null);
      setStatus("polygon obrisan sa ekrana");
    }

    function openGoogleMaps() {
      const lat = document.getElementById("lat").value;
      const lng = document.getElementById("lng").value;

      if (!lat || !lng) {
        alert("Nema Lat/Lng.");
        return;
      }

      window.open(`https://www.google.com/maps?q=${lat},${lng}`, "_blank");
    }

    map.on(L.Draw.Event.CREATED, function (e) {
      drawnItems.clearLayers();
      drawnItems.addLayer(e.layer);

      const geometry = e.layer.toGeoJSON().geometry;
      setJsonPreview(geometry);

      const coords = geometry.coordinates[0];
      const centroid = polygonCentroid(coords);
      setLatLng(centroid.lat, centroid.lng);
      renderPoint(centroid.lat, centroid.lng);

      setStatus("polygon iscrtan");
    });

    map.on(L.Draw.Event.EDITED, function () {
      const geometry = getCurrentPolygonGeometry();
      if (!geometry) return;

      setJsonPreview(geometry);

      const coords = geometry.coordinates[0];
      const centroid = polygonCentroid(coords);
      setLatLng(centroid.lat, centroid.lng);
      renderPoint(centroid.lat, centroid.lng);

      setStatus("polygon izmenjen");
    });

    map.on(L.Draw.Event.DELETED, function () {
      setJsonPreview(null);
      clearLatLng();
      if (markerLayer) {
        map.removeLayer(markerLayer);
        markerLayer = null;
      }
      setStatus("polygon obrisan");
    });

    document.getElementById("btnLoad").addEventListener("click", loadParcel);
    document.getElementById("btnSave").addEventListener("click", savePolygon);
    document.getElementById("btnClear").addEventListener("click", clearPolygon);
    document.getElementById("btnOpenGoogle").addEventListener("click", openGoogleMaps);

    if (parcelaId) {
      loadParcel();
    }
  </script>
</body>
</html>
